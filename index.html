<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LWE - QR + Manual Banco</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body.modo-prueba .container{border:2px solid #00ccff;box-shadow:0 0 30px rgba(0,204,255,.3)}
.container{width:100%;max-width:480px;background:linear-gradient(135deg,#1a1a1a,#2d2d2d);border-radius:20px;padding:30px;box-shadow:0 10px 40px rgba(0,0,0,.5)}
h1{font-size:24px;margin-bottom:10px;color:#00ff00;text-align:center}
.subtitle{font-size:12px;color:#888;text-align:center;margin-bottom:25px}
.login-screen{display:block}
.main-screen{display:none}
.form-group{margin-bottom:20px}
label{display:block;margin-bottom:8px;font-size:13px;color:#aaa}
input,select{width:100%;padding:12px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;font-size:14px}
input:focus,select:focus{outline:none;border-color:#00ff00}
select option.cuenta-buena{background:#0a1a0a;color:#00ff00}
select option.cuenta-mala{background:#1a1a00;color:#ffcc00;font-weight:bold}
select option.cuenta-llena{background:#1a0000;color:#ff3333}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#00ff00,#00cc00);border:none;border-radius:10px;color:#000;font-weight:bold;font-size:15px;cursor:pointer;margin-bottom:10px;transition:.3s}
.btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(0,255,0,.3)}
.btn-sec{background:#333;color:#fff}
.btn-danger{background:linear-gradient(135deg,#ff3333,#cc0000);color:#fff}
.btn-prueba{background:linear-gradient(135deg,#00ccff,#0099cc);color:#000}
.btn-tab{flex:1;padding:12px;background:#222;border:1px solid #333;border-radius:8px 8px 0 0;color:#888;font-weight:bold;cursor:pointer}
.btn-tab.activo{background:#1a1a1a;color:#00ff00;border-bottom:2px solid #00ff00}
.semaforo{display:flex;gap:10px;margin:20px 0;padding:15px;background:#1a1a1a;border-radius:10px}
.semaforo-item{flex:1;text-align:center}
.semaforo-valor{font-size:28px;font-weight:bold;margin-bottom:5px}
.semaforo-label{font-size:11px;color:#888}
.verde{color:#00ff00}.amarillo{color:#ffcc00}.rojo{color:#ff3333}
.tabs{display:flex;gap:5px;margin-bottom:0}
.tab-content{background:#1a1a1a;padding:20px;border-radius:0 10px 10px 10px;margin-bottom:20px}
.qr-container{background:#fff;padding:20px;border-radius:15px;text-align:center}
.qr-container img{width:100%;max-width:300px;margin:0 auto;display:block}
.datos-qr{background:#1a1a1a;padding:15px;border-radius:10px;margin-top:15px;font-size:13px;line-height:1.8;text-align:left}
.datos-qr b{color:#00ff00}
.datos-manual{background:#0a0a0a;padding:20px;border-radius:10px;border:2px solid #00ff00}
.datos-manual .fila{display:flex;justify-content:space-between;padding:12px;border-bottom:1px solid #333;font-size:14px}
.datos-manual .fila:last-child{border-bottom:none}
.datos-manual .label{color:#888}
.datos-manual .valor{color:#00ff00;font-weight:bold;text-align:right;font-family:monospace}
.btn-copiar{background:#00ff00;color:#000;border:none;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:bold;cursor:pointer;margin-top:10px;width:100%}
.btn-copiar:active{transform:scale(0.95)}
.folio-badge{background:#00ff00;color:#000;padding:8px 15px;border-radius:20px;display:inline-block;font-weight:bold;margin-bottom:15px}
.modo-prueba-badge{background:#00ccff;color:#000;padding:8px 15px;border-radius:20px;display:inline-block;font-weight:bold;margin-bottom:15px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.8}}
.alerta{padding:12px;border-radius:8px;margin-bottom:15px;font-size:13px;text-align:center}
.alerta-ok{background:rgba(0,255,0,.1);border:1px solid #00ff00;color:#00ff00}
.alerta-error{background:rgba(255,51,51,.1);border:1px solid #ff3333;color:#ff3333}
.alerta-info{background:rgba(0,204,255,.1);border:1px solid #00ccff;color:#00ccff}
.alerta-warning{background:rgba(255,204,0,.15);border:2px solid #ffcc00;color:#ffcc00}
.oculto{display:none}
.usuario-info{background:#1a1a1a;padding:12px;border-radius:8px;margin-bottom:20px;font-size:13px;text-align:center;line-height:1.6}
.usuario-info b{color:#00ff00}
.monto-display{font-size:36px;font-weight:bold;color:#00ff00;text-align:center;margin:15px 0}
.leyenda-cuentas{background:#1a1a1a;padding:15px;border-radius:8px;margin-bottom:15px;font-size:11px;line-height:1.8;border:2px solid #333}
.leyenda-item{margin:5px 0;padding:5px;border-radius:4px}
.leyenda-verde{background:rgba(0,255,0,.05)}
</style>
</head>
<body>
<div class="container">
  <div id="loginScreen" class="login-screen">
    <h1>🥟 LWE VENTAS</h1>
    <p class="subtitle">QR Técnico + Datos Banco</p>
    <div id="alertaLogin"></div>
    <div class="form-group">
      <label>Usuario</label>
      <select id="usuario">
        <option value="">Selecciona usuario...</option>
        <option value="marcelo">Marcelo</option>
        <option value="nataly">Nataly</option>
        <option value="krishna">Krishna</option>
      </select>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••">
    </div>
    <button class="btn" onclick="login()">ENTRAR</button>
  </div>

  <div id="mainScreen" class="main-screen">
    <h1>🥟 LWE VENTAS</h1>
    <p class="subtitle">Límites: 45/50 todas las cuentas</p>
    
    <div class="usuario-info" id="usuarioInfo"></div>
    
    <div class="leyenda-cuentas">
      <div class="leyenda-item leyenda-verde">
        <b style="color:#00ff00">🟢 TODAS LAS CUENTAS - Límite 45/50</b><br>
        QR: Sin guiones | Manual: Como manda el banco
      </div>
    </div>
    
    <div class="semaforo">
      <div class="semaforo-item">
        <div class="semaforo-valor verde" id="semMensual">0/45</div>
        <div class="semaforo-label">MENSUAL</div>
      </div>
      <div class="semaforo-item">
        <div class="semaforo-valor verde" id="semSemestral">0/100</div>
        <div class="semaforo-label">SEMESTRAL</div>
      </div>
    </div>

    <div id="alertaMain"></div>

    <div class="form-group">
      <label>Cuenta Destino</label>
      <select id="banco" onchange="actualizarSemaforo()"></select>
    </div>

    <div class="form-group">
      <label>Monto ($)</label>
      <input type="number" id="monto" placeholder="2000" min="100" step="100">
    </div>

    <div class="form-group">
      <label>Referencia (opcional)</label>
      <input type="text" id="referencia" placeholder="2 empanadas queso">
    </div>

    <button class="btn btn-prueba" onclick="generarQR(true)">🧪 QR PRUEBA</button>
    <button class="btn" onclick="generarQR(false)">💰 GENERAR PAGO</button>
    <button class="btn btn-sec btn-danger oculto" id="btnSalirPrueba" onclick="salirModoPrueba()">⬅️ SALIR MODO PRUEBA</button>
    <button class="btn btn-sec" onclick="verHistorial()">📊 HISTORIAL</button>
    <button class="btn btn-sec" onclick="logout()">🚪 SALIR</button>

    <div id="qrContainer" class="oculto">
      <div id="badgeContainer"></div>
      <div class="monto-display" id="montoDisplay"></div>
      
      <div class="tabs">
        <button class="btn-tab activo" id="tabQR" onclick="cambiarTab('qr')">📱 QR</button>
        <button class="btn-tab" id="tabManual" onclick="cambiarTab('manual')">📝 DATOS BANCO</button>
      </div>
      
      <div id="contenidoQR" class="tab-content">
        <div class="qr-container">
          <img id="qrImagen" src="" alt="QR">
          <div class="datos-qr" id="datosQR"></div>
        </div>
      </div>
      
      <div id="contenidoManual" class="tab-content oculto">
        <div class="datos-manual" id="datosManual"></div>
        <button class="btn-copiar" onclick="copiarDatos()">📋 COPIAR DATOS</button>
      </div>
      
      <button class="btn" id="btnConfirmar" onclick="confirmarVenta()">✅ CONFIRMAR PAGO RECIBIDO</button>
      <button class="btn btn-sec" id="btnCancelar" onclick="cancelarQR()">❌ CANCELAR</button>
    </div>

    <div id="historialContainer" class="oculto">
      <h3 style="margin:20px 0 10px">📊 Historial</h3>
      <div id="listaHistorial" style="background:#1a1a1a;padding:15px;border-radius:10px;max-height:400px;overflow-y:auto"></div>
      <button class="btn btn-sec" onclick="cerrarHistorial()">⬅️ VOLVER</button>
    </div>
  </div>
</div>

<script>
const USUARIOS = {
  'marcelo': {
    pass: '123',

    rut: '12.082.344-2',

    key: 'marcelo',
    cuentas: [

      {

      },
      {

        tipo: 'Cuenta Vista',

        numeroFormateado: '00-034-48261-53',
        nombre: 'Banco de Chile Vista', 
        calidad: 'buena', 
        limite: 45 
      }
    ]
  },
  'nataly': {
    pass: '123',
    nombreCompleto: 'NATALY CONTRERAS BUSTOS',
    rut: '17.737.531-0',
    prefijo: 'LWE',
    key: 'nataly',
    cuentas: [
      { id: 'bcoestado', banco: 'Banco Estado', tipo: 'CuentaRUT', numero: '17737531', numeroFormateado: '17737531', nombre: 'BancoEstado CuentaRUT', calidad: 'buena', limite: 45 },
      { id: 'tenpo', banco: 'Tenpo', tipo: 'Cuenta Vista', numero: '111117737531', numeroFormateado: '111117737531', nombre: 'Tenpo Vista', calidad: 'buena', limite: 45 }
    ]
  },
  'krishna': {
    pass: '123',
    nombreCompleto: 'KRISHNA VERA CABALLERO',
    rut: '17.901.095-5',
    prefijo: 'LWE',
    key: 'krishna',
    cuentas: [
      { id: 'bcoestado', banco: 'Banco Estado', tipo: 'CuentaRUT', numero: '17901095', numeroFormateado: '17901095', nombre: 'BancoEstado CuentaRUT', calidad: 'buena', limite: 45 },
      { id: 'tenpo', banco: 'Tenpo', tipo: 'Cuenta Vista', numero: '111117901095', numeroFormateado: '111117901095', nombre: 'Tenpo Vista', calidad: 'buena', limite: 45 }
    ]
  }
};

const DB = {
  get: (k, d) => JSON.parse(localStorage.getItem(k) || JSON.stringify(d)),
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
  getFolio: (k) => DB.get(`folio_${k}`, 0),
  setFolio: (k, v) => DB.set(`folio_${k}`, v),
  getVentas: (k) => DB.get(`ventas_${k}`, []),
  addVenta: (k, v) => {
    const l = DB.getVentas(k);
    l.unshift(v);
    DB.set(`ventas_${k}`, l.slice(0, 200));
  }
};

let usuarioActual = null;
let esPrueba = false;
let ventaPendiente = null;
let tabActual = 'qr';

function mostrarAlerta(msg, tipo = 'ok', cont = 'alertaMain') {
  const el = document.getElementById(cont);
  const clase = tipo === 'ok'? 'alerta-ok' : tipo === 'error'? 'alerta-error' : tipo === 'warning'? 'alerta-warning' : 'alerta-info';
  el.innerHTML = `<div class="alerta ${clase}">${msg}</div>`;
  setTimeout(() => el.innerHTML = '', 6000);
}

function login() {
  const u = document.getElementById('usuario').value.toLowerCase().trim();
  const p = document.getElementById('password').value;
  if (!u) { mostrarAlerta('⚠️ Selecciona un usuario', 'error', 'alertaLogin'); return; }
  if (!USUARIOS[u] || USUARIOS[u].pass!== p) {
    mostrarAlerta('❌ Usuario o contraseña incorrectos', 'error', 'alertaLogin');
    return;
  }
  usuarioActual = USUARIOS[u];
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'block';
  document.getElementById('usuarioInfo').innerHTML = `<b>${usuarioActual.nombreCompleto}</b><br>RUT: ${usuarioActual.rut}`;
  cargarBancos();
  actualizarSemaforo();
}

function logout() {
  usuarioActual = null;
  esPrueba = false;
  document.body.classList.remove('modo-prueba');
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('usuario').value = '';
  document.getElementById('password').value = '';
  cancelarQR();
}

function cargarBancos() {
  const sel = document.getElementById('banco');
  sel.innerHTML = '<option value="">Selecciona cuenta destino...</option>';
  usuarioActual.cuentas.forEach(c => {
    const cont = getContadorBanco(c.id);
    let clase = 'cuenta-buena';
    let estado = '✅ OK';
    
    if (cont.mensual >= c.limite) {
      clase = 'cuenta-llena';
      estado = `⛔ BLOQUEADO ${c.limite}/${c.limite}`;
    } else if (cont.mensual >= c.limite - 5) {
      clase = 'cuenta-llena';
      estado = `⚠️ CASI ${c.limite}`;
    }
    
    sel.innerHTML += `<option value="${c.id}" class="${clase}">${c.nombre} (${cont.mensual}/${c.limite}) ${estado}</option>`;
  });
}

function getContadorBanco(bancoId) {
  const ventas = DB.getVentas(usuarioActual.key).filter(v => v.bancoId === bancoId && !v.prueba);
  const ahora = new Date();
  const inicioMes = new Date(ahora.getFullYear(), ahora.getMonth(), 1);
  const inicioSem = new Date(ahora.getFullYear(), ahora.getMonth() >= 6? 6 : 0, 1);
  return {
    mensual: ventas.filter(v => new Date(v.fecha) >= inicioMes).length,
    semestral: ventas.filter(v => new Date(v.fecha) >= inicioSem).length
  };
}

function actualizarSemaforo() {
  const bancoId = document.getElementById('banco').value;
  if (!bancoId) {
    document.getElementById('semMensual').textContent = '0/45';
    document.getElementById('semSemestral').textContent = '0/100';
    return;
  }
  const c = getContadorBanco(bancoId);
  const cuenta = usuarioActual.cuentas.find(cta => cta.id === bancoId);
  const m = document.getElementById('semMensual');
  const s = document.getElementById('semSemestral');
  m.textContent = `${c.mensual}/${cuenta.limite}`;
  s.textContent = `${c.semestral}/100`;
  m.className = 'semaforo-valor ' + (c.mensual >= cuenta.limite - 5? 'rojo' : c.mensual >= cuenta.limite - 15? 'amarillo' : 'verde');
  s.className = 'semaforo-valor ' + (c.semestral >= 90? 'rojo' : c.semestral >= 70? 'amarillo' : 'verde');
}

function generarQR(prueba) {
  const bancoId = document.getElementById('banco').value;
  const monto = parseInt(document.getElementById('monto').value);
  const ref = document.getElementById('referencia').value.trim();

  if (!bancoId) { mostrarAlerta('⚠️ Selecciona una cuenta destino', 'error'); return; }
  if (!monto || monto < 100) { mostrarAlerta('⚠️ Monto mínimo $100', 'error'); return; }

  esPrueba = prueba;
  document.body.classList.toggle('modo-prueba', prueba);

  if (!prueba) {
    const cont = getContadorBanco(bancoId);
    const cuenta = usuarioActual.cuentas.find(c => c.id === bancoId);
    if (cont.mensual >= cuenta.limite) { 
      mostrarAlerta(`⛔ BLOQUEADO. ${cuenta.nombre} llegó a ${cuenta.limite}/${cuenta.limite}. Usa otra cuenta.`, 'error'); 
      cargarBancos(); 
      return; 
    }
  }

  const cuenta = usuarioActual.cuentas.find(c => c.id === bancoId);
  const folio = prueba? 'PRUEBA' : `${usuarioActual.prefijo}-${String(DB.getFolio(usuarioActual.key) + 1).padStart(3, '0')}`;

  const codigosBanco = { 'Banco Estado': '037', 'BCI': '016', 'Banco de Chile': '001', 'Tenpo': '051' };
  const tiposCuenta = { 'CuentaRUT': 'CTARUT', 'Cuenta Corriente': 'CTACTE', 'Cuenta Vista': 'CTAVIS' };

  const codBanco = codigosBanco[cuenta.banco];
  const codTipo = tiposCuenta[cuenta.tipo];
  const rutSinPuntos = usuarioActual.rut.replace(/\./g, '');

  // QR usa numero sin guiones
  const textoQR = `TRANSFERENCIA
RUT:${rutSinPuntos}
NOMBRE:${usuarioActual.nombreCompleto}
BANCO:${codBanco}
TIPO:${codTipo}
CUENTA:${cuenta.numero}
MONTO:${monto}
REF:${folio}`;

  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(textoQR)}`;
  
  ventaPendiente = { bancoId, cuenta, monto, ref, folio, fecha: new Date().toISOString(), prueba };

  document.getElementById('badgeContainer').innerHTML = prueba
    ? '<div class="modo-prueba-badge">🟢 MODO PRUEBA</div>'
    : `<div class="folio-badge">${folio}</div>`;
  document.getElementById('montoDisplay').textContent = `$${monto.toLocaleString('es-CL')}`;
  document.getElementById('qrImagen').src = qrUrl;
  
  // TAB QR - datos técnicos sin guiones
  document.getElementById('datosQR').innerHTML = `
    <b>Cuenta:</b> ${cuenta.nombre}<br>
    <b>Banco:</b> ${cuenta.banco} (${codBanco})<br>
    <b>Tipo:</b> ${codTipo}<br>
    <b>N° Cuenta:</b> ${cuenta.numero}<br>
    <b>RUT:</b> ${rutSinPuntos}<br>
    <b>Monto:</b> $${monto.toLocaleString('es-CL')}<br>
    <b>Ref:</b> ${folio}<br>
    ${ref? `<b>Nota:</b> ${ref}<br>` : ''}
    <br>
    <b style="color:#00ff00">✅ QR técnico - Sin guiones</b>
  `;
  
  // TAB MANUAL - como lo manda el banco con guiones
  document.getElementById('datosManual').innerHTML = `
    <div class="fila">
      <span class="label">Nombre:</span>
      <span class="valor">${usuarioActual.nombreCompleto}</span>
    </div>
    <div class="fila">
      <span class="label">RUT:</span>
      <span class="valor">${usuarioActual.rut}</span>
    </div>
    <div class="fila">
      <span class="label">Banco:</span>
      <span class="valor">${cuenta.banco}</span>
    </div>
    <div class="fila">
      <span class="label">Tipo Cuenta:</span>
      <span class="valor">${cuenta.tipo}</span>
    </div>
    <div class="fila">
      <span class="label">N° Cuenta:</span>
      <span class="valor">${cuenta.numeroFormateado}</span>
    </div>
    <div class="fila">
      <span class="label">Monto:</span>
      <span class="valor">$${monto.toLocaleString('es-CL')}</span>
    </div>
    <div class="fila">
      <span class="label">Referencia:</span>
      <span class="valor">${folio}</span>
    </div>
  `;

  document.getElementById('btnConfirmar').style.display = prueba? 'none' : 'block';
  document.getElementById('btnCancelar').style.display = prueba? 'none' : 'block';
  document.getElementById('btnSalirPrueba').classList.toggle('oculto',!prueba);
  document.getElementById('qrContainer').classList.remove('oculto');
  cambiarTab('qr');
  document.getElementById('qrContainer').scrollIntoView({ behavior: 'smooth' });

  mostrarAlerta('✅ Pago listo - QR técnico + Datos banco', 'info');
}

function cambiarTab(tab) {
  tabActual = tab;
  document.getElementById('tabQR').classList.toggle('activo', tab === 'qr');
  document.getElementById('tabManual').classList.toggle('activo', tab === 'manual');
  document.getElementById('contenidoQR').classList.toggle('oculto', tab !== 'qr');
  document.getElementById('contenidoManual').classList.toggle('oculto', tab !== 'manual');
}

function copiarDatos() {
  if (!ventaPendiente) return;
  const cuenta = ventaPendiente.cuenta;
  const texto = `Nombre: ${usuarioActual.nombreCompleto}
RUT: ${usuarioActual.rut}
Banco: ${cuenta.banco}
Tipo: ${cuenta.tipo}
N° Cuenta: ${cuenta.numeroFormateado}
Monto: $${ventaPendiente.monto.toLocaleString('es-CL')}
Referencia: ${ventaPendiente.folio}`;
  
  navigator.clipboard.writeText(texto).then(() => {
    mostrarAlerta('✅ Datos del banco copiados', 'ok');
  }).catch(() => {
    mostrarAlerta('⚠️ Copia manual los datos de arriba', 'info');
  });
}

function confirmarVenta() {
  if (!ventaPendiente || esPrueba) return;
  DB.addVenta(usuarioActual.key, ventaPendiente);
  DB.setFolio(usuarioActual.key, DB.getFolio(usuarioActual.key) + 1);
  const nuevoCont = getContadorBanco(ventaPendiente.bancoId).mensual + 1;
  const limite = ventaPendiente.cuenta.limite;
  mostrarAlerta(`✅ Pago confirmado. ${ventaPendiente.cuenta.nombre}: ${nuevoCont}/${limite}`, 'ok');
  cancelarQR();
  cargarBancos();
  actualizarSemaforo();
  document.getElementById('monto').value = '';
  document.getElementById('referencia').value = '';
}

function cancelarQR() {
  document.getElementById('qrContainer').classList.add('oculto');
  ventaPendiente = null;
}

function salirModoPrueba() {
  esPrueba = false;
  document.body.classList.remove('modo-prueba');
  cancelarQR();
  mostrarAlerta('✅ Modo prueba desactivado', 'info');
}

function verHistorial() {
  const ventas = DB.getVentas(usuarioActual.key).slice(0, 20);
  const lista = document.getElementById('listaHistorial');
  if (ventas.length === 0) {
    lista.innerHTML = '<p style="text-align:center;color:#888;padding:20px">Sin ventas</p>';
  } else {
    lista.innerHTML = ventas.map(v => `
      <div style="padding:12px;border-bottom:1px solid #333;font-size:12px">
        <b style="color:#00ff00">${v.folio}</b> ${v.prueba? '<span style="color:#00ccff">(PRUEBA)</span>' : ''}<br>
        <span style="color:#00ff00;font-size:16px">$${v.monto.toLocaleString('es-CL')}</span> → ${v.cuenta.nombre}<br>
        <span style="color:#888">${new Date(v.fecha).toLocaleString('es-CL')}</span>
        ${v.ref? `<br><span style="color:#aaa">📝 ${v.ref}</span>` : ''}
      </div>
    `).join('');
  }
  document.getElementById('historialContainer').classList.remove('oculto');
}

function cerrarHistorial() {
  document.getElementById('historialContainer').classList.add('oculto');
}

document.getElementById('password').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') login();
});
document.getElementById('monto').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') generarQR(false);
});
</script>
</body>
</html>
